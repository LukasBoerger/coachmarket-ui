<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Als Coach registrieren</h1>
    <p class="auth-subtitle">Erstelle dein Konto und trage dich als Coach ein</p>

    <form (ngSubmit)="onSubmit()" [formGroup]="form" class="auth-form">
      <div class="field">
        <label>E-Mail</label>
        <input formControlName="email" placeholder="deine@email.de" type="email"/>
      </div>

      <div class="field">
        <label>Passwort</label>
        <input formControlName="password" placeholder="Min. 6 Zeichen" type="password"/>
      </div>

      <div class="field">
        <label>Passwort bestätigen</label>
        <input formControlName="passwordConfirm" placeholder="••••••••" type="password"/>
      </div>

      <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>

      <button [disabled]="loading" class="btn-primary" type="submit">
        {{ loading ? 'Wird erstellt...' : 'Konto erstellen' }}
      </button>
    </form>

    <p class="auth-footer">
      Bereits registriert?
      <a routerLink="/login">Jetzt anmelden</a>
    </p>
  </div>
</div>
