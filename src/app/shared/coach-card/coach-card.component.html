<a
  [routerLink]="['/coaches', coach.slug]"
  class="coach-card"
>
  <div class="card-layout">
    <!-- Avatar -->
    <div class="avatar-wrapper">
      <div [ngClass]="{ 'avatar-placeholder': !coach.avatarUrl }" class="avatar">
        <img *ngIf="coach.avatarUrl" [alt]="coach.name" [src]="coach.avatarUrl"/>
        <span *ngIf="!coach.avatarUrl">
          {{ coach.name ? coach.name[0] : '?' }}
        </span>
      </div>
    </div>

    <!-- Content -->
    <div class="card-content">
      <!-- Header: Name + Ort + Format + Preis -->
      <div class="card-header">
        <div class="title-block">
          <div class="name">{{ coach.name }}</div>

          <div class="meta-row">
            <span
              *ngIf="coach.city"
              class="pill pill-location"
            >
              📍 {{ coach.city }}
            </span>

            <span *ngIf="coach.remoteAvailable" class="pill">Remote</span>
            <span *ngIf="coach.inPersonAvailable" class="pill">Vor Ort</span>
          </div>
        </div>

        <div *ngIf="coach.priceFrom" class="price-block">
          <div class="price-main">{{ coach.priceFrom }} €</div>
          <div class="price-sub">
            ab Preis
            <ng-container *ngIf="coach.priceUnit; else direct">
              ({{ coach.priceUnit }})
            </ng-container>
            <ng-template #direct>
              (direkt beim Coach)
            </ng-template>
          </div>
        </div>
      </div>

      <!-- Tagline -->
      <p *ngIf="coach.tagline" class="tagline">
        {{ coach.tagline }}
      </p>

      <!-- Footer: Tags + CTA -->
      <div class="card-footer">
        <div *ngIf="coach.sports?.length || coach.specializations?.length" class="tags">
  <span *ngFor="let sport of coach.sports | slice:0:1" class="tag tag-main">
    {{ sport }}
  </span>
          <span *ngFor="let spec of coach.specializations | slice:0:2" class="tag tag-secondary">
    {{ spec }}
  </span>
        </div>

        <span class="cta-btn">
  Profil ansehen →
</span>
      </div>
    </div>
  </div>
</a>
