<nav class="navbar">
  <div class="nav-inner">

    <!-- Logo -->
    <a class="logo" routerLink="/">CoachMarktplatz</a>

    <!-- Desktop Links -->
    <div class="desktop-nav">
      <a class="nav-link" routerLink="/coaches" routerLinkActive="active">
        Coaches finden
      </a>

      <div class="nav-dropdown">
        <button class="nav-link dropdown-trigger">
          Sportarten <span class="chevron">▾</span>
        </button>
        <div class="dropdown-menu">
          <a [queryParams]="{sportSlug: 'fitness'}" class="dropdown-item" routerLink="/coaches">Fitness</a>
          <a [queryParams]="{sportSlug: 'bodybuilding'}" class="dropdown-item" routerLink="/coaches">Bodybuilding</a>
          <a [queryParams]="{sportSlug: 'laufen'}" class="dropdown-item" routerLink="/coaches">Laufen</a>
          <a [queryParams]="{sportSlug: 'crossfit'}" class="dropdown-item" routerLink="/coaches">Hyrox / Functional</a>
          <a [queryParams]="{sportSlug: 'handball'}" class="dropdown-item" routerLink="/coaches">Handball</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <button class="nav-link dropdown-trigger">
          Für Coaches <span class="chevron">▾</span>
        </button>
        <div class="dropdown-menu">
          <a class="dropdown-item" routerLink="/for-coaches">Coach werden</a>
          <a class="dropdown-item" routerLink="/for-coaches">So funktioniert's</a>
        </div>
      </div>

      <a class="nav-link" routerLink="/wissen" routerLinkActive="active">Wissen</a>
    </div>

    <!-- CTA: nicht eingeloggt -->
    <div *ngIf="!(user$ | async)" class="nav-actions">
      <a class="btn-login" routerLink="/login">Anmelden</a>
      <a class="btn-register" routerLink="/register">Als Coach eintragen</a>
    </div>

    <!-- CTA: eingeloggt -->
    <div *ngIf="user$ | async" class="nav-actions">
      <a class="btn-login" routerLink="/my/coach-profile">Mein Profil</a>
      <button (click)="logout()" class="btn-logout">Abmelden</button>
    </div>

    <!-- Mobile Burger -->
    <button (click)="mobileOpen = !mobileOpen" class="burger">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div [class.open]="mobileOpen" class="mobile-menu">
    <a (click)="mobileOpen = false" class="mobile-link" routerLink="/coaches">Coaches finden</a>
    <a (click)="mobileOpen = false" class="mobile-link" routerLink="/for-coaches">Für Coaches</a>
    <a (click)="mobileOpen = false" class="mobile-link" routerLink="/wissen">Wissen</a>
    <hr class="mobile-divider">

    <ng-container *ngIf="!(user$ | async)">
      <a (click)="mobileOpen = false" class="mobile-link" routerLink="/login">Anmelden</a>
      <a (click)="mobileOpen = false" class="mobile-link mobile-register" routerLink="/register">Als Coach eintragen</a>
    </ng-container>

    <ng-container *ngIf="user$ | async">
      <a (click)="mobileOpen = false" class="mobile-link" routerLink="/my/coach-profile">Mein Profil</a>
      <button (click)="logout(); mobileOpen = false" class="mobile-link mobile-logout">Abmelden</button>
    </ng-container>
  </div>
</nav>
